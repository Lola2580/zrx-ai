<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ZRX AI Dashboard</title>

<link rel="stylesheet"
href="dashboard.css">

</head>

<body>

<div class="topbar">

<div class="logo">
🔥 ZRX AI
</div>

<button
class="logout-btn"
onclick="logout()"
>

Logout

</button>

</div>

<div class="main-card">

<div class="label">
NEXT PERIOD
</div>

<div class="period" id="period">
--
</div>

<div class="prediction big" id="prediction">
WAIT
</div>

<div class="bar">

<div class="fill" id="fill"></div>

</div>

</div>

<div class="stats">

<div class="card">

<div class="card-title">
CONFIDENCE
</div>

<div class="card-value yellow"
id="confidence">
0%
</div>

</div>

<div class="card">

<div class="card-title">
SIGNAL
</div>

<div class="card-value green"
id="signal">
--
</div>

</div>

<div class="card">

<div class="card-title">
AI IQ
</div>

<div class="card-value red"
id="iq">
0
</div>

</div>

<div class="card">

<div class="card-title">
COUNTDOWN
</div>

<div class="card-value yellow"
id="countdown">
00:00
</div>

</div>

<div class="card">

<div class="card-title">
TOTAL SIGNALS
</div>

<div class="card-value"
id="total">
0
</div>

</div>

</div>

<div class="history-box">

<div class="history-title">
AI HISTORY
</div>

<div id="history"></div>

</div>

<script src="dashboard.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ZRX AI Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#050505;

color:white;

padding:20px;
}

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;
}

.logo{

font-size:32px;

font-weight:bold;

color:#ff2e2e;
}

button{

padding:12px 18px;

background:red;

border:none;

color:white;

border-radius:12px;

cursor:pointer;

font-weight:bold;
}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;
}

.card{

background:#111;

border:1px solid #222;

border-radius:20px;

padding:25px;

box-shadow:
0 0 20px rgba(255,0,0,.1);
}

.card h2{

margin-bottom:15px;

font-size:20px;

color:#888;
}

.card p{

font-size:28px;

font-weight:bold;
}

.green{
color:#00ff99;
}

.red{
color:#ff3c3c;
}

.yellow{
color:#ffd500;
}

.big{
color:#00c3ff;
}

#history{

max-height:350px;

overflow:auto;

margin-top:15px;
}

.history-item{

background:#1a1a1a;

padding:12px;

border-radius:12px;

margin-bottom:10px;

border-left:4px solid #00ff99;

font-size:14px;
}

.time{
margin-top:5px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
🔥 ZRX AI
</div>

<button onclick="logout()">
Logout
</button>

</div>

<div class="grid">

<div class="card">

<h2>
WELCOME
</h2>

<p id="welcome"></p>

</div>

<div class="card">

<h2>
AI STATUS
</h2>

<p class="green">
ONLINE
</p>

</div>

<div class="card">

<h2>
PREDICTION
</h2>

<p class="big" id="prediction">
BIG
</p>

</div>

<div class="card">

<h2>
CONFIDENCE
</h2>

<p class="yellow" id="confidence">
92%
</p>

</div>

<div class="card">

<h2>
AI IQ
</h2>

<p class="red" id="iq">
178
</p>

</div>

<div class="card">

<h2>
WIN RATE
</h2>

<p class="green" id="winrate">
87%
</p>

</div>

<div class="card">

<h2>
LIVE CLOCK
</h2>

<p id="clock"></p>

</div>

<div class="card">

<h2>
TOTAL PREDICTIONS
</h2>

<p id="total">
0
</p>

</div>

<div class="card">

<h2>
PREDICTION HISTORY
</h2>

<div id="history"></div>

</div>

</div>

<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!user){

window.location.href =
"index.html";

}

document.getElementById(
"welcome"
).innerText =
"Hello, " + user.username;

// LOGOUT

function logout(){

localStorage.removeItem(
"user"
);

window.location.href =
"index.html";

}

// CLOCK

setInterval(()=>{

document.getElementById(
"clock"
).innerText =
new Date().toLocaleTimeString();

},1000);

// AI MEMORY

let aiHistory = JSON.parse(
localStorage.getItem("aiHistory")
) || [];

// AI ENGINE

function generateAI(){

const predictions = [
   "BIG",
   "SMALL"
];

const prediction =
predictions[
Math.floor(Math.random()*2)
];

const confidence =
Math.floor(
70 + Math.random()*30
);

const iq =
Math.floor(
140 + Math.random()*60
);

const winrate =
Math.floor(
80 + Math.random()*20
);

document.getElementById(
"prediction"
).innerText =
prediction;

document.getElementById(
"confidence"
).innerText =
confidence + "%";

document.getElementById(
"iq"
).innerText =
iq;

document.getElementById(
"winrate"
).innerText =
winrate + "%";

// SAVE HISTORY

const historyItem = {

prediction,

confidence,

iq,

time:
new Date().toLocaleTimeString()

};

aiHistory.unshift(historyItem);

aiHistory = aiHistory.slice(0,20);

localStorage.setItem(
"aiHistory",
JSON.stringify(aiHistory)
);

// UPDATE UI

renderHistory();

}

// RENDER HISTORY

function renderHistory(){

const historyDiv =
document.getElementById(
"history"
);

historyDiv.innerHTML = "";

aiHistory.forEach(item=>{

historyDiv.innerHTML += `

<div class="history-item">

<div>
Prediction:
<b>${item.prediction}</b>
</div>

<div>
Confidence:
${item.confidence}%
</div>

<div>
AI IQ:
${item.iq}
</div>

<div class="time">
${item.time}
</div>

</div>

`;

});

document.getElementById(
"total"
).innerText =
aiHistory.length;

}

// START SYSTEM

generateAI();

renderHistory();

setInterval(()=>{

generateAI();

},5000);

</script>

</body>
</html>

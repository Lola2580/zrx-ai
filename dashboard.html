<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZRX AI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
padding:20px;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#ff000025,transparent 30%),
radial-gradient(circle at bottom right,#00ffff18,transparent 30%),
#050505;
z-index:-1;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logo{
font-size:34px;
font-weight:700;
color:#ff3434;
text-shadow:0 0 15px rgba(255,0,0,.5);
}

.logout-btn{
padding:12px 20px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff1e1e,#990000);
color:white;
font-weight:600;
cursor:pointer;
box-shadow:0 0 15px rgba(255,0,0,.25);
}

.dashboard-layout{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.left-panel{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:linear-gradient(145deg,#121212,#0c0c0c);
border:1px solid #202020;
border-radius:24px;
padding:22px;
position:relative;
overflow:hidden;
box-shadow:0 0 25px rgba(255,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 0 35px rgba(255,0,0,.18);
}

.card-title{
font-size:13px;
letter-spacing:1px;
color:#777;
margin-bottom:15px;
}

.card-value{
font-size:38px;
font-weight:700;
}

.big{
color:#00c3ff;
}

.green{
color:#00ff99;
}

.yellow{
color:#ffd500;
}

.red{
color:#ff4d4d;
}

.clock{
font-size:28px;
}

.main-ai-card{
grid-column:span 2;
background:
linear-gradient(145deg,#171717,#0d0d0d);
border:1px solid #242424;
}

.ai-status{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
}

.prediction-box{
text-align:center;
}

.prediction-box h1{
font-size:70px;
margin-top:10px;
}

.confidence-bar{
margin-top:18px;
width:100%;
height:12px;
background:#1c1c1c;
border-radius:30px;
overflow:hidden;
}

.confidence-fill{
height:100%;
width:92%;
background:linear-gradient(90deg,#ff0000,#ffd500,#00ff99);
}

.right-panel{
background:linear-gradient(145deg,#121212,#0c0c0c);
border:1px solid #202020;
border-radius:24px;
padding:22px;
height:calc(100vh - 120px);
overflow:hidden;
display:flex;
flex-direction:column;
}

.history-title{
font-size:22px;
font-weight:700;
margin-bottom:18px;
color:#ff3434;
}

#history{
flex:1;
overflow-y:auto;
padding-right:6px;
}

.history-item{
background:#161616;
border-radius:18px;
padding:15px;
margin-bottom:14px;
border-left:4px solid #00ff99;
}

.history-top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.history-prediction{
font-size:18px;
font-weight:700;
}

.history-confidence{
color:#ffd500;
font-weight:600;
}

.history-time{
font-size:12px;
color:#777;
margin-top:8px;
}

@media(max-width:1000px){

.dashboard-layout{
grid-template-columns:1fr;
}

.right-panel{
height:auto;
}

.main-ai-card{
grid-column:span 1;
}

.prediction-box h1{
font-size:50px;
}

}

</style>
</head>
<body>

<div class="topbar">

<div class="logo">
🔥 ZRX AI
</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

<div class="dashboard-layout">

<div class="left-panel">

<div class="card main-ai-card">

<div class="ai-status">

<div>
<div class="card-title">
AI SYSTEM STATUS
</div>
<div class="card-value green">
ONLINE
</div>

<div class="confidence-bar">
<div class="confidence-fill" id="confidenceFill"></div>
</div>

</div>

<div class="prediction-box">
<div class="card-title">
LIVE PREDICTION
</div>
<h1 class="big" id="prediction">
BIG
</h1>
</div>

</div>

</div>

<div class="card">
<div class="card-title">CONFIDENCE</div>
<div class="card-value yellow" id="confidence">
92%
</div>
</div>

<div class="card">
<div class="card-title">AI IQ</div>
<div class="card-value red" id="iq">
178
</div>
</div>

<div class="card">
<div class="card-title">WIN RATE</div>
<div class="card-value green" id="winrate">
87%
</div>
</div>

<div class="card">
<div class="card-title">TOTAL SIGNALS</div>
<div class="card-value" id="total">
0
</div>
</div>

<div class="card">
<div class="card-title">LIVE CLOCK</div>
<div class="card-value clock" id="clock"></div>
</div>

<div class="card">
<div class="card-title">WELCOME</div>
<div class="card-value" id="welcome">
Hello Admin
</div>
</div>

</div>

<div class="right-panel">

<div class="history-title">
Prediction History
</div>

<div id="history"></div>

</div>

</div>

<script>

const API_URL =
"https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";

// AUTH

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!user){

window.location.href =
"index.html";

}

// WELCOME

document.getElementById(
"welcome"
).innerText =
"Hello, " + user.username;

// LOGOUT

function logout(){

localStorage.removeItem(
"user"
);

window.location.href =
"index.html";

}

// CLOCK

setInterval(()=>{

document.getElementById(
"clock"
).innerText =
new Date().toLocaleTimeString();

},1000);

// AI STORAGE

let aiHistory = JSON.parse(
localStorage.getItem("aiHistory")
) || [];

let currentPrediction = null;

// AI ENGINE

async function generateAI(){

try{

const response =
await fetch(
API_URL + "?t=" + Date.now()
);

const data =
await response.json();

const history =
data.data.list;

const latest =
history[0];

const currentPeriod =
latest.issueNumber;

const latestNumber =
parseInt(latest.number);

const latestResult =
latestNumber >= 5
? "BIG"
: "SMALL";

// TREND

let bigCount = 0;
let smallCount = 0;

history.slice(0,10).forEach(item=>{

const n =
parseInt(item.number);

if(n >= 5){

bigCount++;

}else{

smallCount++;

}

});

let aiPrediction =
bigCount > smallCount
? "BIG"
: "SMALL";

// RANDOM REVERSAL

if(Math.random() > 0.7){

aiPrediction =
aiPrediction === "BIG"
? "SMALL"
: "BIG";

}

// CONFIDENCE

const confidence =
Math.floor(
80 + Math.random()*20
);

// IQ

const iq =
Math.floor(
160 + Math.random()*40
);

// WINRATE

const winrate =
Math.floor(
85 + Math.random()*15
);

// CHECK OLD PREDICTION

if(
currentPrediction &&
currentPrediction.period !== currentPeriod
){

const status =
currentPrediction.prediction
=== latestResult
? "WIN"
: "LOSS";

currentPrediction.status =
status;

currentPrediction.result =
latestResult;

currentPrediction.number =
latestNumber;

}

// CREATE NEW PREDICTION

if(
!aiHistory.length ||
aiHistory[0].period !== currentPeriod
){

currentPrediction = {

period:currentPeriod,

prediction:aiPrediction,

confidence,

iq,

result:"WAIT",

number:"--",

status:"PENDING",

time:
new Date().toLocaleTimeString()

};

aiHistory.unshift(currentPrediction);

}

// LIMIT HISTORY

aiHistory = aiHistory.slice(0,20);

// SAVE

localStorage.setItem(
"aiHistory",
JSON.stringify(aiHistory)
);

// UI UPDATE

document.getElementById(
"period"
).innerText =
currentPeriod;

document.getElementById(
"prediction"
).innerText =
aiPrediction;

document.getElementById(
"number"
).innerText =
latestNumber;

document.getElementById(
"resultStatus"
).innerText =
latestResult;

document.getElementById(
"confidence"
).innerText =
confidence + "%";

document.getElementById(
"iq"
).innerText =
iq;

document.getElementById(
"winrate"
).innerText =
winrate + "%";

document.getElementById(
"confidenceFill"
).style.width =
confidence + "%";

// HISTORY

renderHistory();

}catch(err){

console.log(err);

document.getElementById(
"resultStatus"
).innerText =
"API ERROR";

}

}

// RENDER HISTORY

function renderHistory(){

const historyDiv =
document.getElementById(
"history"
);

historyDiv.innerHTML = "";

let wins = 0;
let losses = 0;

aiHistory.forEach(item=>{

if(item.status === "WIN"){
wins++;
}

if(item.status === "LOSS"){
losses++;
}

historyDiv.innerHTML += `

<div class="history-item">

<div class="history-top">

<div class="history-prediction ${item.prediction === 'BIG' ? 'big' : 'yellow'}">

${item.prediction}

</div>

<div class="history-confidence">

${item.confidence}%

</div>

</div>

<div>
Period:
${item.period}
</div>

<div>
Result:
${item.result}
</div>

<div>
Number:
${item.number}
</div>

<div>
Status:
<b style="
color:
${item.status === 'WIN'
? '#00ff99'
: item.status === 'LOSS'
? '#ff3c3c'
: '#ffd500'}
">

${item.status}

</b>
</div>

<div>
AI IQ:
${item.iq}
</div>

<div class="history-time">

${item.time}

</div>

</div>

`;

});

// TOTAL

document.getElementById(
"total"
).innerText =
aiHistory.length;

}

// START

generateAI();

setInterval(()=>{

generateAI();

},5000);

</script>
</body>
</html>

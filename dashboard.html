<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ZRX Dashboard</title>

<style>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#050505;

color:white;

padding:20px;
}

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;
}

.logo{

font-size:32px;

font-weight:bold;

color:#ff2e2e;
}

button{

padding:12px 18px;

background:red;

border:none;

color:white;

border-radius:12px;

cursor:pointer;
}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;
}

.card{

background:#111;

border:1px solid #222;

border-radius:20px;

padding:25px;

box-shadow:
0 0 20px rgba(255,0,0,.1);
}

.card h2{

margin-bottom:15px;

font-size:20px;

color:#888;
}

.card p{

font-size:28px;

font-weight:bold;
}

.green{
color:#00ff99;
}

.red{
color:#ff3c3c;
}

.yellow{
color:#ffd500;
}

.big{
color:#00c3ff;
}

</style>
</style>

</head>

<body>

<div class="topbar">

<div class="logo">
🔥 ZRX AI
</div>

<button onclick="logout()">
Logout
</button>

</div>

<div class="grid">

<div class="card">

<h2>
WELCOME
</h2>

<p id="welcome"></p>

</div>

<div class="card">

<h2>
AI STATUS
</h2>

<p class="green">
ONLINE
</p>

</div>

<div class="card">

<h2>
PREDICTION
</h2>

<p class="big">
BIG
</p>

</div>

<div class="card">

<h2>
CONFIDENCE
</h2>

<p class="yellow">
92%
</p>

</div>

<div class="card">

<h2>
AI IQ
</h2>

<p class="red">
178
</p>

</div>

<div class="card">

<h2>
WIN RATE
</h2>

<p class="green">
87%
</p>

</div>

<div class="card">

<h2>
LIVE CLOCK
</h2>

<p id="clock"></p>

</div>

</div>
<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!user){

window.location.href =
"index.html";

}

document.getElementById(
"welcome"
).innerText =
"Hello, " + user.username;

function logout(){

localStorage.removeItem(
"user"
);

window.location.href =
"index.html";
}
setInterval(()=>{

document.getElementById(
"clock"
).innerText =
new Date().toLocaleTimeString();

},1000);
</script>

</body>
</html>

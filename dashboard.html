<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ZRX Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#050505;

color:white;

padding:30px;
}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;
}

.logo{

font-size:32px;

font-weight:bold;

color:#ff2e2e;
}

button{

padding:12px 20px;

border:none;

border-radius:10px;

background:#ff2e2e;

color:white;

font-weight:bold;

cursor:pointer;
}

.card{

background:#111;

border:1px solid #222;

padding:25px;

border-radius:20px;

margin-top:20px;
}

h2{
color:#00ff99;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
🔥 ZRX AI
</div>

<button onclick="logout()">
Logout
</button>

</div>

<div class="card">

<h2 id="welcome"></h2>

<p>
Welcome to futuristic AI dashboard 😎
</p>

</div>

<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!user){

window.location.href =
"index.html";

}

document.getElementById(
"welcome"
).innerText =
"Hello, " + user.username;

function logout(){

localStorage.removeItem(
"user"
);

window.location.href =
"index.html";
}

</script>

</body>
</html>

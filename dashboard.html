<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZRX AI Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
padding:15px;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#ff000020,transparent 30%),
radial-gradient(circle at bottom right,#00ffff15,transparent 30%),
#050505;
z-index:-1;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
font-size:30px;
font-weight:700;
color:#ff3434;
text-shadow:0 0 15px rgba(255,0,0,.4);
}

.logout-btn{
padding:12px 18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff1e1e,#990000);
color:white;
font-weight:600;
cursor:pointer;
}

.dashboard{
display:grid;
grid-template-columns:1fr;
gap:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.card{
background:linear-gradient(145deg,#121212,#0d0d0d);
border:1px solid #222;
border-radius:24px;
padding:20px;
box-shadow:0 0 25px rgba(255,0,0,.06);
}

.card-title{
font-size:12px;
letter-spacing:1px;
color:#777;
margin-bottom:10px;
}

.card-value{
font-size:30px;
font-weight:700;
}

.main-card{
padding:25px;
}

.prediction{
font-size:85px;
font-weight:700;
text-align:center;
margin-top:10px;
color:#00c3ff;
text-shadow:0 0 20px rgba(0,195,255,.5);
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.06);
}

100%{
transform:scale(1);
}

}

.big{
color:#00c3ff;
}

.small{
color:#ffd500;
}

.green{
color:#00ff99;
}

.red{
color:#ff4d4d;
}

.yellow{
color:#ffd500;
}

.bar{
margin-top:15px;
width:100%;
height:12px;
background:#1c1c1c;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
width:90%;
background:linear-gradient(90deg,#ff0000,#ffd500,#00ff99);
}

.history-panel{
background:linear-gradient(145deg,#121212,#0d0d0d);
border:1px solid #222;
border-radius:24px;
padding:20px;
}

.history-title{
font-size:22px;
font-weight:700;
margin-bottom:15px;
color:#ff3434;
}

#history{
max-height:500px;
overflow-y:auto;
}

.history-item{
background:#171717;
border-left:4px solid #00ff99;
padding:15px;
border-radius:16px;
margin-bottom:14px;
}

.history-top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.status-win{
color:#00ff99;
}

.status-loss{
color:#ff3c3c;
}

.status-pending{
color:#ffd500;
}

.time{
margin-top:8px;
font-size:12px;
color:#777;
}

@media(max-width:700px){

.prediction{
font-size:60px;
}

.card-value{
font-size:24px;
}

}

</style>
</head>
<body>

<div class="topbar">

<div class="logo">
🔥 ZRX AI
</div>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

<div class="dashboard">

<div class="card main-card">

<div class="card-title">
NEXT PERIOD PREDICTION
</div>

<div class="card-value yellow" id="period">
--
</div>

<div class="prediction" id="prediction">
WAIT
</div>

<div class="bar">
<div class="fill" id="confidenceFill"></div>
</div>

</div>

<div class="grid">

<div class="card">

<div class="card-title">
LATEST RESULT
</div>

<div class="card-value red" id="latestNumber">
--
</div>

</div>

<div class="card">

<div class="card-title">
LAST RESULT
</div>

<div class="card-value green" id="lastResult">
--
</div>

</div>

<div class="card">

<div class="card-title">
CONFIDENCE
</div>

<div class="card-value yellow" id="confidence">
0%
</div>

</div>

<div class="card">

<div class="card-title">
SIGNAL
</div>

<div class="card-value green" id="signal">
--
</div>

</div>

<div class="card">

<div class="card-title">
AI IQ
</div>

<div class="card-value red" id="iq">
0
</div>

</div>

<div class="card">

<div class="card-title">
WIN RATE
</div>

<div class="card-value green" id="winrate">
0%
</div>

</div>

<div class="card">

<div class="card-title">
NEXT RESULT
</div>

<div class="card-value yellow" id="countdown">
00:00
</div>

</div>

<div class="card">

<div class="card-title">
TOTAL SIGNALS
</div>

<div class="card-value" id="total">
0
</div>

</div>

</div>

<div class="history-panel">

<div class="history-title">
Prediction History
</div>

<div id="history"></div>

</div>

</div>

<script>

const API_URL =
"https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";

// AUTH

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!user){

window.location.href =
"index.html";

}

// LOGOUT

function logout(){

localStorage.removeItem(
"user"
);

window.location.href =
"index.html";

}

// STORAGE

let aiHistory =
JSON.parse(
localStorage.getItem("aiHistory")
) || [];

let lockedPeriod = null;

// MAIN AI

async function generateAI(){

try{

const response =
await fetch(
API_URL + "?t=" + Date.now()
);

const data =
await response.json();

const history =
data.data.list;

const latest =
history[0];

// COMPLETED PERIOD

const completedPeriod =
parseInt(latest.issueNumber);

// NEXT PERIOD

const nextPeriod =
String(completedPeriod + 1);

// LATEST RESULT

const latestNumber =
parseInt(latest.number);

const latestResult =
latestNumber >= 5
? "BIG"
: "SMALL";

// TREND ANALYSIS

let bigCount = 0;
let smallCount = 0;

history.slice(0,10).forEach(item=>{

const n =
parseInt(item.number);

if(n >= 5){

bigCount++;

}else{

smallCount++;

}

});

// AI PREDICTION

let prediction =
bigCount > smallCount
? "BIG"
: "SMALL";

// REVERSAL CHANCE

if(Math.random() > 0.7){

prediction =
prediction === "BIG"
? "SMALL"
: "BIG";

}

// LOCK PREDICTION

if(lockedPeriod !== nextPeriod){

lockedPeriod = nextPeriod;

// CONFIDENCE

const confidence =
Math.floor(
80 + Math.random()*20
);

// SIGNAL

let signal = "LOW";

if(confidence >= 90){

signal = "STRONG";

}else if(confidence >= 80){

signal = "NORMAL";

}

// IQ

const iq =
Math.floor(
160 + Math.random()*40
);

// WIN RATE

const winrate =
Math.floor(
85 + Math.random()*15
);

// CHECK OLD SIGNAL

if(aiHistory.length > 0){

const old =
aiHistory[0];

if(
old.status === "PENDING"
){

old.result =
latestResult;

old.number =
latestNumber;

old.status =
old.prediction === latestResult
? "WIN"
: "LOSS";

}

}

// NEW SIGNAL

const signalData = {

period:nextPeriod,

prediction,

confidence,

signal,

iq,

winrate,

status:"PENDING",

result:"WAIT",

number:"--",

time:
new Date().toLocaleTimeString()

};

aiHistory.unshift(signalData);

aiHistory =
aiHistory.slice(0,20);

localStorage.setItem(
"aiHistory",
JSON.stringify(aiHistory)
);

// UPDATE UI

document.getElementById(
"period"
).innerText =
nextPeriod;

document.getElementById(
"prediction"
).innerText =
prediction;

document.getElementById(
"prediction"
).className =
prediction.toLowerCase();

document.getElementById(
"latestNumber"
).innerText =
latestNumber;

document.getElementById(
"lastResult"
).innerText =
latestResult;

document.getElementById(
"confidence"
).innerText =
confidence + "%";

document.getElementById(
"signal"
).innerText =
signal;

document.getElementById(
"iq"
).innerText =
iq;

document.getElementById(
"winrate"
).innerText =
winrate + "%";

document.getElementById(
"confidenceFill"
).style.width =
confidence + "%";

renderHistory();

}

}catch(err){

console.log(err);

}

}

// HISTORY

function renderHistory(){

const historyDiv =
document.getElementById(
"history"
);

historyDiv.innerHTML = "";

let wins = 0;
let losses = 0;

aiHistory.forEach(item=>{

if(item.status === "WIN"){
wins++;
}

if(item.status === "LOSS"){
losses++;
}

historyDiv.innerHTML += `

<div class="history-item">

<div class="history-top">

<div class="
${item.prediction === 'BIG'
? 'big'
: 'small'}
">

<b>${item.prediction}</b>

</div>

<div>

${item.confidence}%

</div>

</div>

<div>
Period:
${item.period}
</div>

<div>
Result:
${item.result}
</div>

<div>
Number:
${item.number}
</div>

<div>
Signal:
${item.signal}
</div>

<div>
Status:

<span class="
${item.status === 'WIN'
? 'status-win'
: item.status === 'LOSS'
? 'status-loss'
: 'status-pending'}
">

${item.status}

</span>

</div>

<div>
AI IQ:
${item.iq}
</div>

<div class="time">

${item.time}

</div>

</div>

`;

});

// TOTAL

document.getElementById(
"total"
).innerText =
aiHistory.length;

}

// COUNTDOWN

function startCountdown(){

setInterval(()=>{

const now =
new Date();

let seconds =
now.getSeconds();

let remaining =
60 - seconds;

if(remaining < 10){

remaining =
"0" + remaining;

}

document.getElementById(
"countdown"
).innerText =
"00:" + remaining;

},1000);

}

// START

generateAI();

renderHistory();

startCountdown();

setInterval(()=>{

generateAI();

},4000);

</script>

</body>
</html>
